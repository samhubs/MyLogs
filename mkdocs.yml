site_name: Samlogs
site_description: Long-form notes on machine learning, software, and systems by Sameer Sharma.
site_url: https://samhubs.github.io/MyLogs/

nav:
  - Home: index.md
  - Posts:
      - Overview: posts/index.md
      - Monocular depth for real-world measurement: posts/2025-01-24-monocular-depth-for-measurement.md
      - Are you __init__ or not?: posts/2025-01-21-init-or-not.md
  - About: about.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - stylesheets/blog.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
