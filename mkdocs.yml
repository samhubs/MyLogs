site_name: Samlogs
site_description: Long-form notes on machine learning, software, and systems by Sameer Sharma.
site_url: https://samhubs.github.io/MyLogs/

nav:
  - Home: index.md
  - Posts:
      - Overview: posts/index.md
      - Publishing Guide: posts/publishing-guide.md
      - 100 Days of Research:
          - Overview: posts/research-100/index.md
          - "Day 001: Paper Implementation Template": posts/research-100/001-paper-implementation-template.md
      - Technical Notes:
          - Overview: posts/technical-notes/index.md
          - Monocular depth for real-world measurement: posts/technical-notes/monocular-depth-measurement.md
          - Are you __init__ or not?: posts/technical-notes/python-init-or-not.md
      - Short Stories:
          - Overview: posts/short-stories/index.md
  - About: about.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - stylesheets/blog.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
